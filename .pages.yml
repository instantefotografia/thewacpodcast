# .pages.yml — Pages CMS config for: posts, authors, podcast, infopages
# Images stored under: src/images/{about,authors,thumbnails} and loose files

media:
  name: images
  label: Images
  input: src/images
  output: src/images
  path: ""                          # root of /src/images
  extensions: [png, jpg, jpeg, webp, svg]

settings:
  content:
    merge: true

content:
  # ---------------------
  # POSTS
  # ---------------------
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, pubDate, author]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - { name: title,       label: Title, type: string, required: true }
      - { name: pubDate,     label: Publication Date, type: date }
      - { name: description, label: Description, type: text }
      - { name: author,      label: Author, type: string }
      - name: image
        label: Cover Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: thumbnails }   # src/images/thumbnails
          - { name: alt, label: Alt text, type: string }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: isRecent,  label: Is Recent,  type: boolean }
      - { name: isPopular, label: Is Popular, type: boolean }
      - { name: isLocked,  label: Is Locked,  type: boolean }
      - { name: body,      label: Body, type: rich-text }

  # ---------------------
  # AUTHORS
  # ---------------------
  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, role]
      sort: [name]
    fields:
      - { name: name,  label: Name, type: string, required: true }
      - { name: role,  label: Role, type: string }
      - { name: bio,   label: Bio, type: text }
      - name: image
        label: Author Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: authors }      # src/images/authors
          - { name: alt, label: Alt text, type: string }
      - name: socials
        label: Socials
        type: object
        fields:
          - { name: twitter,  label: Twitter,  type: string }
          - { name: website,  label: Website,  type: string }
          - { name: linkedin, label: LinkedIn, type: string }
          - { name: email,    label: Email,    type: string }
      - { name: body, label: Body, type: rich-text }

  # ---------------------
  # PODCAST
  # ---------------------
  - name: podcast
    label: Podcast
    type: collection
    path: src/content/podcast
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, pubDate, author]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - { name: title,          label: Title, type: string, required: true }
      - { name: pubDate,        label: Publication Date, type: date }
      - { name: description,    label: Description, type: text }
      - { name: author,         label: Author, type: string }
      - name: image
        label: Podcast Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: thumbnails }   # src/images/thumbnails
          - { name: alt, label: Alt text, type: string }
      - name: guestAvatar
        label: Guest Avatar
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options: { media: images, path: authors }      # src/images/authors
          - { name: alt, label: Alt text, type: string }
      - { name: episodeNumber, label: Episode Number, type: number }
      - { name: duration,      label: Duration, type: string }
      - { name: audioSrc,      label: Audio Source, type: string }
      - { name: tags,          label: Tags, type: string, list: true }
      - { name: isRecent,      label: Is Recent, type: boolean }
      - { name: isPopular,     label: Is Popular, type: boolean }
      - { name: isLocked,      label: Is Locked, type: boolean }
      - { name: body,          label: Body, type: rich-text }

  # ---------------------
  # INFO PAGES
  # ---------------------
  - name: infopages
    label: Info Pages
    type: collection
    path: src/content/infopages
    filename: "{primary}.md"
    view:
      primary: page
      fields: [page, pubDate]
      sort: [page]
    fields:
      - { name: page,    label: Page, type: string, required: true }
      - { name: pubDate, label: Publication Date, type: date }
      - { name: body,    label: Body, type: rich-text }
